<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <filter id="shadow3" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="rgba(0,0,0,0.35)"/>
    </filter>
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feFlood flood-color="#A78BFA" result="glowColor"/>
      <feComposite in="glowColor" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="bgGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#120A24;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1F1235;stop-opacity:1"/>
    </linearGradient>
  </defs>


  <rect x="64" y="64" width="896" height="896" rx="220" fill="url(#bgGrad3)" filter="url(#shadow3)"/>
  <rect x="64" y="64" width="896" height="380" rx="220" fill="rgba(255,255,255,0.04)"/>


  <g transform="translate(512, 512)">
    
  
    <circle cx="0" cy="0" r="370" fill="none" stroke="#A78BFA" stroke-width="1.5" stroke-dasharray="4 8" opacity="0.45"/>
    
 
    <g stroke="#A78BFA" stroke-width="1" opacity="0.35" stroke-linecap="round">

      <line x1="-320" y1="-320" x2="-240" y2="-240"/>
      <line x1="320" y1="-320" x2="240" y2="-240"/>
      <line x1="-320" y1="320" x2="-240" y2="240"/>
      <line x1="320" y1="320" x2="240" y2="240"/>
      <line x1="-240" y1="-240" x2="-160" y2="-160"/>
      <line x1="240" y1="-240" x2="160" y2="-160"/>
      <line x1="-240" y1="240" x2="-160" y2="160"/>
      <line x1="240" y1="240" x2="160" y2="160"/>
      <line x1="-160" y1="-160" x2="-80" y2="-80"/>
      <line x1="160" y1="-160" x2="80" y2="-80"/>
      <line x1="-160" y1="160" x2="-80" y2="80"/>
      <line x1="160" y1="160" x2="80" y2="80"/>
   
      <line x1="0" y1="-320" x2="0" y2="-240"/>
      <line x1="0" y1="240" x2="0" y2="320"/>
      <line x1="-320" y1="0" x2="-240" y2="0"/>
      <line x1="240" y1="0" x2="320" y2="0"/>
    </g>

 
    <g fill="none" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round">
      <rect x="-320" y="-320" width="640" height="640" rx="32" opacity="0.88"/>
      <rect x="-240" y="-240" width="480" height="480" rx="24" opacity="0.8"/>
      <rect x="-160" y="-160" width="320" height="320" rx="16" opacity="0.72"/>
      <rect x="-80" y="-80" width="160" height="160" rx="10" opacity="0.64"/>
    </g>


    <g fill="#A78BFA" opacity="0.85">
  
      <circle cx="-320" cy="-320" r="4"/><circle cx="320" cy="-320" r="4"/>
      <circle cx="-320" cy="320" r="4"/><circle cx="320" cy="320" r="4"/>

      <circle cx="-240" cy="-240" r="3.5"/><circle cx="240" cy="-240" r="3.5"/>
      <circle cx="-240" cy="240" r="3.5"/><circle cx="240" cy="240" r="3.5"/>

      <circle cx="-160" cy="-160" r="3"/><circle cx="160" cy="-160" r="3"/>
      <circle cx="-160" cy="160" r="3"/><circle cx="160" cy="160" r="3"/>

      <circle cx="-80" cy="-80" r="2.5"/><circle cx="80" cy="-80" r="2.5"/>
      <circle cx="-80" cy="80" r="2.5"/><circle cx="80" cy="80" r="2.5"/>
    </g>


    <g filter="url(#neonGlow)">
      <rect x="-64" y="-16" width="128" height="32" rx="7" fill="#FFFFFF"/>
      <rect x="-16" y="-64" width="32" height="128" rx="7" fill="#FFFFFF"/>
    </g>
    

    <circle cx="0" cy="0" r="42" fill="#A78BFA" opacity="0.12"/>
  </g>


  <path d="M 280 180 Q 512 140 744 180" stroke="rgba(255,255,255,0.12)" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>