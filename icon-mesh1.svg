<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
    <filter id="cyanGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#00E5FF" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1E293B;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <rect x="64" y="64" width="896" height="896" rx="220" fill="url(#bgGrad2)" filter="url(#shadow)"/>
  <rect x="64" y="64" width="896" height="380" rx="220" fill="rgba(255,255,255,0.05)"/>

  <g transform="translate(512, 512)">

    <g stroke="#00E5FF" stroke-width="1.2" opacity="0.3" stroke-linecap="round">
      <line x1="-320" y1="-320" x2="-240" y2="-240"/>
      <line x1="320" y1="-320" x2="240" y2="-240"/>
      <line x1="-320" y1="320" x2="-240" y2="240"/>
      <line x1="320" y1="320" x2="240" y2="240"/>
      <line x1="-240" y1="-240" x2="-160" y2="-160"/>
      <line x1="240" y1="-240" x2="160" y2="-160"/>
      <line x1="-240" y1="240" x2="-160" y2="160"/>
      <line x1="240" y1="240" x2="160" y2="160"/>
      <line x1="-160" y1="-160" x2="-80" y2="-80"/>
      <line x1="160" y1="-160" x2="80" y2="-80"/>
      <line x1="-160" y1="160" x2="-80" y2="80"/>
      <line x1="160" y1="160" x2="80" y2="80"/>

      <line x1="-320" y1="0" x2="-240" y2="0"/>
      <line x1="240" y1="0" x2="320" y2="0"/>
      <line x1="0" y1="-320" x2="0" y2="-240"/>
      <line x1="0" y1="240" x2="0" y2="320"/>
    </g>


    <g fill="none" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round">
      <rect x="-320" y="-320" width="640" height="640" rx="32" opacity="0.88"/>
      <rect x="-240" y="-240" width="480" height="480" rx="24" opacity="0.8"/>
      <rect x="-160" y="-160" width="320" height="320" rx="16" opacity="0.72"/>
      <rect x="-80" y="-80" width="160" height="160" rx="10" opacity="0.64"/>
    </g>


    <g filter="url(#cyanGlow)" fill="#FFFFFF">
      <rect x="-56" y="-12" width="112" height="24" rx="5"/>
      <rect x="-12" y="-56" width="24" height="112" rx="5"/>
    </g>

  
    <g stroke="#00E5FF" stroke-width="10" stroke-linecap="round" opacity="0.75">
      <line x1="-340" y1="0" x2="-290" y2="0"/>
      <line x1="290" y1="0" x2="340" y2="0"/>
      <line x1="0" y1="-340" x2="0" y2="-290"/>
      <line x1="0" y1="290" x2="0" y2="340"/>
    </g>


    <g fill="#00E5FF" opacity="0.85">
      <rect x="-334" y="-334" width="10" height="10" rx="2"/>
      <rect x="324" y="-334" width="10" height="10" rx="2"/>
      <rect x="-334" y="324" width="10" height="10" rx="2"/>
      <rect x="324" y="324" width="10" height="10" rx="2"/>
    </g>


    <circle cx="0" cy="0" r="364" fill="none" stroke="#00E5FF" stroke-width="2.5" opacity="0.35"/>
  </g>

  <path d="M 280 180 Q 512 140 744 180" stroke="rgba(255,255,255,0.15)" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>